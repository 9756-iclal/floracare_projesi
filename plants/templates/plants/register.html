<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloraCare | Kayıt Ol</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f4f7f6; }
        .auth-card { max-width: 420px; margin: 80px auto; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 12px; }
        .btn-success { background-color: #198754; border: none; }
        .btn-success:hover { background-color: #146c43; }
    </style>
</head>
<body>
<div class="card auth-card">
    <div class="card-body p-4">
        <h3 class="text-center text-success mb-3">🌿 FloraCare</h3>
        <h5 class="text-center text-muted mb-4">Yeni Hesap Oluştur</h5>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label text-secondary" style="font-weight: 500;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small class="form-text text-muted d-block" style="font-size: 0.75rem; margin-top: 4px;">{{ field.help_text }}</small>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success w-100 py-2 mt-3">Kayıt Ol ve Başla</button>
        </form>
        <p class="text-center mt-4 mb-0">
            <a href="{% url 'login' %}" class="text-success text-decoration-none" style="font-size: 0.9rem;">Zaten hesabın var mı? Giriş yap</a>
        </p>
    </div>
</div>

<script>
    // Django'nun standart input alanlarını yakalayıp Bootstrap sınıfı ekleyen sihirli JS
    var inputs = document.getElementsByTagName('input');
    for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].type !== 'submit') {
            inputs[i].classList.add('form-control');
        }
    }
</script>
</body>
</html>
